name: OpenSpec

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate OpenSpec changes
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec

      - name: Install app dependencies
        run: npm ci

      - name: Validate OpenSpec specs
        run: openspec validate --specs

      - name: List OpenSpec changes
        run: openspec list

      - name: Build first prototype
        run: npm run build
