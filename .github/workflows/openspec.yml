name: OpenSpec

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate OpenSpec changes
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec

      - name: Validate Hungarian Christian blog plan
        run: openspec validate plan-hungarian-christian-blog

      - name: Show OpenSpec status
        run: openspec status --change plan-hungarian-christian-blog
