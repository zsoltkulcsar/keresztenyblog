name: OpenSpec

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate OpenSpec changes
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec

      - name: Install app dependencies
        run: npm ci

      - name: Validate OpenSpec specs
        run: openspec validate --specs

      - name: Validate active OpenSpec changes
        run: |
          node -e "const { execFileSync } = require('node:child_process'); const data = JSON.parse(execFileSync('openspec', ['list', '--json'], { encoding: 'utf8' })); for (const change of data.changes || []) { execFileSync('openspec', ['validate', change.name], { stdio: 'inherit' }); }"

      - name: Build first prototype
        run: npm run build
